name: Deploy Soroban Escrow Contract

on:
  workflow_dispatch:
    inputs:
      skip_build:
        description: "Skip build? (set true if WASM already built & cached)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

      skip_deploy:
        description: "Skip deploy? (set true if contract already deployed)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

      existing_contract_id:
        description: "Existing Contract ID (paste here if deploy already succeeded but init failed)"
        required: false
        default: ""

      token_contract_id:
        description: "Payment token contract ID (leave blank to use native XLM testnet SAC)"
        required: false
        default: "CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC"

env:
  CARGO_TERM_COLOR: always
  STELLAR_NETWORK: testnet
  # Native XLM SAC on Stellar Testnet (default payment token)
  XLM_TOKEN: CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Build the WASM binary
  # Skipped automatically if cache hit or skip_build=true
  # ─────────────────────────────────────────────
  build:
    name: "1️⃣ Build Contract WASM"
    runs-on: ubuntu-latest

    outputs:
      wasm_cached: ${{ steps.cache_wasm.outputs.cache-hit }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Cache the compiled WASM — keyed on contract source files
      - name: Check WASM cache
        id: cache_wasm
        uses: actions/cache@v4
        with:
          path: contracts/target/wasm32-unknown-unknown/release/agropay_escrow.wasm
          key: wasm-${{ hashFiles('contracts/**/*.rs', 'contracts/**/*.toml') }}

      - name: "⏭️ Skip build (cache hit or skip_build=true)"
        if: steps.cache_wasm.outputs.cache-hit == 'true' || inputs.skip_build == 'true'
        run: echo "WASM already built — skipping compile step."

      # Only install Rust if we actually need to build
      - name: Install Rust + WASM target
        if: steps.cache_wasm.outputs.cache-hit != 'true' && inputs.skip_build != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust cargo registry
        if: steps.cache_wasm.outputs.cache-hit != 'true' && inputs.skip_build != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: cargo-${{ hashFiles('contracts/**/Cargo.lock', 'contracts/**/Cargo.toml') }}
          restore-keys: |
            cargo-

      - name: Build contract (release WASM)
        if: steps.cache_wasm.outputs.cache-hit != 'true' && inputs.skip_build != 'true'
        working-directory: contracts/agropay_escrow
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: agropay-escrow-wasm
          path: contracts/target/wasm32-unknown-unknown/release/agropay_escrow.wasm
          retention-days: 30

      - name: Show WASM size
        run: |
          WASM=contracts/target/wasm32-unknown-unknown/release/agropay_escrow.wasm
          if [ -f "$WASM" ]; then
            echo "✅ WASM built successfully: $(du -sh $WASM | cut -f1)"
          else
            echo "❌ WASM file not found!"
            exit 1
          fi

  # ─────────────────────────────────────────────
  # JOB 2 — Deploy to Stellar Testnet
  # Skipped if skip_deploy=true OR existing_contract_id is provided
  # ─────────────────────────────────────────────
  deploy:
    name: "2️⃣ Deploy to Stellar Testnet"
    runs-on: ubuntu-latest
    needs: build
    if: inputs.skip_deploy != 'true' && inputs.existing_contract_id == ''

    outputs:
      contract_id: ${{ steps.deploy.outputs.contract_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: agropay-escrow-wasm
          path: contracts/target/wasm32-unknown-unknown/release/

      - name: Install Stellar CLI
        run: |
          # Cache-friendly install
          if ! command -v stellar &> /dev/null; then
            cargo install --locked stellar-cli --features opt
          fi
          stellar --version

      - name: Cache Stellar CLI binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/stellar
          key: stellar-cli-v21

      - name: Configure Stellar network
        run: |
          stellar network add testnet \
            --rpc-url https://soroban-testnet.stellar.org \
            --network-passphrase "Test SDF Network ; September 2015" \
            2>/dev/null || echo "Network already configured"

      - name: Setup admin identity from secret
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
        run: |
          echo "$STELLAR_SECRET_KEY" | stellar keys add admin --secret-key
          echo "Admin address: $(stellar keys address admin)"

      - name: Fund account via Friendbot
        run: |
          ADMIN_ADDR=$(stellar keys address admin)
          echo "Funding $ADMIN_ADDR on testnet..."
          curl -s "https://friendbot.stellar.org/?addr=$ADMIN_ADDR" | python3 -m json.tool || true
          echo "✅ Funded (or already funded)"

      - name: Deploy contract to testnet
        id: deploy
        run: |
          WASM=contracts/target/wasm32-unknown-unknown/release/agropay_escrow.wasm
          echo "Deploying $WASM to testnet..."

          CONTRACT_ID=$(stellar contract deploy \
            --wasm "$WASM" \
            --source admin \
            --network testnet \
            --fee 1000000)

          echo "contract_id=$CONTRACT_ID" >> $GITHUB_OUTPUT
          echo "CONTRACT_ID=$CONTRACT_ID" >> $GITHUB_ENV

          echo ""
          echo "=========================================="
          echo "✅ CONTRACT DEPLOYED SUCCESSFULLY!"
          echo "   Contract ID: $CONTRACT_ID"
          echo "=========================================="
          echo ""
          echo "⚠️  SAVE THIS ID — if init fails, re-run with:"
          echo "    existing_contract_id = $CONTRACT_ID"
          echo "    skip_deploy = true"

      - name: Save Contract ID to job summary
        run: |
          echo "## ✅ Contract Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Contract ID | \`${{ steps.deploy.outputs.contract_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Network | Testnet |" >> $GITHUB_STEP_SUMMARY
          echo "| Token | \`${{ inputs.token_contract_id || env.XLM_TOKEN }}\` |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 3 — Initialize the contract
  # Picks up contract_id from deploy job OR from input
  # ─────────────────────────────────────────────
  initialize:
    name: "3️⃣ Initialize Contract"
    runs-on: ubuntu-latest
    needs: [build, deploy]
    # Always run this job (deploy may be skipped if ID already known)
    if: always() && (needs.deploy.result == 'success' || inputs.existing_contract_id != '')

    steps:
      - name: Resolve Contract ID
        id: resolve
        run: |
          # Use existing_contract_id input if provided, otherwise use deploy output
          if [ -n "${{ inputs.existing_contract_id }}" ]; then
            CONTRACT_ID="${{ inputs.existing_contract_id }}"
            echo "Using provided Contract ID: $CONTRACT_ID"
          else
            CONTRACT_ID="${{ needs.deploy.outputs.contract_id }}"
            echo "Using deployed Contract ID: $CONTRACT_ID"
          fi

          if [ -z "$CONTRACT_ID" ]; then
            echo "❌ No Contract ID available! Deploy failed or no existing_contract_id provided."
            exit 1
          fi

          echo "contract_id=$CONTRACT_ID" >> $GITHUB_OUTPUT
          echo "CONTRACT_ID=$CONTRACT_ID" >> $GITHUB_ENV

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt
        
      - name: Cache Stellar CLI binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/stellar
          key: stellar-cli-v21

      - name: Configure Stellar network
        run: |
          stellar network add testnet \
            --rpc-url https://soroban-testnet.stellar.org \
            --network-passphrase "Test SDF Network ; September 2015" \
            2>/dev/null || echo "Network already configured"

      - name: Restore admin identity
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
        run: |
          echo "$STELLAR_SECRET_KEY" | stellar keys add admin --secret-key

      - name: Initialize contract
        run: |
          CONTRACT_ID="${{ steps.resolve.outputs.contract_id }}"
          TOKEN="${{ inputs.token_contract_id || env.XLM_TOKEN }}"
          ADMIN=$(stellar keys address admin)

          echo "Initializing contract $CONTRACT_ID..."
          echo "Admin: $ADMIN"
          echo "Token: $TOKEN"

          stellar contract invoke \
            --id "$CONTRACT_ID" \
            --source admin \
            --network testnet \
            --fee 1000000 \
            -- initialize \
            --admin "$ADMIN" \
            --token "$TOKEN"

          echo "✅ Contract initialized!"

      - name: Print final summary
        run: |
          CONTRACT_ID="${{ steps.resolve.outputs.contract_id }}"
          TOKEN="${{ inputs.token_contract_id || env.XLM_TOKEN }}"

          echo ""
          echo "=========================================="
          echo "  🎉 DEPLOYMENT COMPLETE!"
          echo "=========================================="
          echo ""
          echo "  Contract ID : $CONTRACT_ID"
          echo "  Token       : $TOKEN"
          echo "  Network     : Testnet"
          echo ""
          echo "  ➡️  Add to Render (backend env vars):"
          echo "      ESCROW_CONTRACT_ID=$CONTRACT_ID"
          echo ""
          echo "  ➡️  Add to Vercel (frontend env vars):"
          echo "      VITE_ESCROW_CONTRACT_ID=$CONTRACT_ID"
          echo "=========================================="

      - name: Write to GitHub Step Summary
        run: |
          CONTRACT_ID="${{ steps.resolve.outputs.contract_id }}"
          echo "## 🎉 AgroPay Contract Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Variable | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Render** | \`ESCROW_CONTRACT_ID\` | \`$CONTRACT_ID\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Vercel** | \`VITE_ESCROW_CONTRACT_ID\` | \`$CONTRACT_ID\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Copy these values into your Render and Vercel environment variables." >> $GITHUB_STEP_SUMMARY
