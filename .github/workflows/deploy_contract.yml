name: Deploy Soroban Escrow Contract

on:
  workflow_dispatch:
    inputs:
      skip_build:
        description: "Skip build? (true if WASM already built)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

      skip_deploy:
        description: "Skip deploy? (true if contract already deployed)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

      existing_contract_id:
        description: "Paste Contract ID here if deploy succeeded but init failed"
        required: false
        default: ""

      token_contract_id:
        description: "Payment token contract ID (native XLM testnet SAC by default)"
        required: false
        default: "CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC"

env:
  CARGO_TERM_COLOR: always
  XLM_TOKEN: CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC
  STELLAR_CLI_VERSION: "27.0.0"

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Build the WASM binary
  # ─────────────────────────────────────────────
  build:
    name: "1️⃣ Build Contract WASM"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable + WASM target
        if: inputs.skip_build != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry (deps only, not target)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-deps-${{ hashFiles('contracts/**/Cargo.toml') }}
          restore-keys: cargo-deps-

      - name: Build contract WASM
        if: inputs.skip_build != 'true'
        working-directory: contracts/agropay_escrow
        env:
          RUSTFLAGS: "-C target-feature=-reference-types"
        run: |
          echo "Rust: $(rustc --version)"
          echo "RUSTFLAGS: $RUSTFLAGS"
          cargo build --target wasm32-unknown-unknown --release
          echo "✅ Build complete"
          ls -lah ../target/wasm32-unknown-unknown/release/*.wasm

      # wasm-opt forcefully strips reference-types from the binary
      - name: Install wasm-opt and strip reference-types
        if: inputs.skip_build != 'true'
        run: |
          sudo apt-get install -y binaryen
          WASM=$(find contracts/target/wasm32-unknown-unknown/release -name '*.wasm' ! -name '*.optimized.wasm' | head -1)
          echo "Processing: $WASM"
          
          # Print WASM features before
          echo "Before wasm-opt:"
          wasm-dis "$WASM" 2>/dev/null | grep -i "reference\|funcref\|externref" | head -5 || echo "(no feature headers found)"
          
          # Strip reference-types and optimize
          wasm-opt "$WASM" \
            --disable-reference-types \
            --disable-gc \
            -O2 \
            -o "${WASM%.wasm}.clean.wasm"
          
          # Replace original with cleaned version
          mv "${WASM%.wasm}.clean.wasm" "$WASM"
          echo "✅ wasm-opt complete: $(du -sh $WASM | cut -f1)"

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: agropay-escrow-wasm
          path: contracts/target/wasm32-unknown-unknown/release/agropay_escrow.wasm
          retention-days: 5
          overwrite: true

      - name: Verify WASM
        run: |
          WASM=$(find contracts/target/wasm32-unknown-unknown/release -name 'agropay_escrow.wasm' | head -1)
          if [ -n "$WASM" ]; then
            echo "✅ WASM ready: $(du -sh $WASM | cut -f1)"
          else
            echo "❌ WASM not found!"
            exit 1
          fi

  # ─────────────────────────────────────────────
  # JOB 2 — Deploy to Stellar Testnet
  # ─────────────────────────────────────────────
  deploy:
    name: "2️⃣ Deploy to Stellar Testnet"
    runs-on: ubuntu-latest
    needs: build
    if: inputs.skip_deploy != 'true' && inputs.existing_contract_id == ''

    outputs:
      contract_id: ${{ steps.deploy.outputs.contract_id }}

    steps:
      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: agropay-escrow-wasm
          path: wasm/

      - name: Install Stellar CLI (pre-built)
        run: |
          curl -fsSL "https://github.com/stellar/stellar-cli/releases/download/v${{ env.STELLAR_CLI_VERSION }}/stellar-cli-installer-v${{ env.STELLAR_CLI_VERSION }}-x86_64-unknown-linux-gnu.tar.gz" -o stellar-cli.tar.gz \
            || curl -fsSL "https://github.com/stellar/stellar-cli/releases/download/v${{ env.STELLAR_CLI_VERSION }}/stellar-cli-${{ env.STELLAR_CLI_VERSION }}-x86_64-unknown-linux-gnu.tar.gz" -o stellar-cli.tar.gz
          
          mkdir -p stellar-extract && tar xzf stellar-cli.tar.gz -C stellar-extract
          STELLAR_BIN=$(find stellar-extract -name 'stellar' -type f | head -1)
          
          if [ -z "$STELLAR_BIN" ]; then
            curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
            cargo binstall stellar-cli@${{ env.STELLAR_CLI_VERSION }} --no-confirm --no-symlinks 2>/dev/null \
              || { sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config libudev-dev && cargo install --locked stellar-cli; }
          else
            chmod +x "$STELLAR_BIN" && sudo cp "$STELLAR_BIN" /usr/local/bin/stellar
          fi
          stellar --version

      - name: Configure testnet
        run: |
          stellar network add testnet \
            --rpc-url https://soroban-testnet.stellar.org \
            --network-passphrase "Test SDF Network ; September 2015" \
            2>/dev/null || true

      - name: Setup admin identity
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
        run: |
          echo "$STELLAR_SECRET_KEY" | stellar keys add admin --secret-key 2>/dev/null || true
          echo "Admin: $(stellar keys address admin)"

      - name: Fund account
        run: |
          ADDR=$(stellar keys address admin)
          curl -s "https://friendbot.stellar.org/?addr=$ADDR" > /dev/null || true
          echo "✅ Funded"

      - name: Deploy contract
        id: deploy
        run: |
          WASM=$(find wasm/ -name '*.wasm' | head -1)
          echo "Deploying $WASM..."

          CONTRACT_ID=$(stellar contract deploy \
            --wasm "$WASM" \
            --source admin \
            --network testnet \
            --inclusion-fee 1000000)

          echo "contract_id=$CONTRACT_ID" >> $GITHUB_OUTPUT

          echo "=========================================="
          echo "✅ CONTRACT DEPLOYED!"
          echo "   Contract ID: $CONTRACT_ID"
          echo ""
          echo "⚠️  IF INIT FAILS, re-run with:"
          echo "    existing_contract_id = $CONTRACT_ID"
          echo "    skip_deploy = true"
          echo "=========================================="

      - name: Job summary
        run: |
          echo "## ✅ Contract Deployed" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Contract ID | \`${{ steps.deploy.outputs.contract_id }}\` |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 3 — Initialize the contract
  # ─────────────────────────────────────────────
  initialize:
    name: "3️⃣ Initialize Contract"
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always() && (needs.deploy.result == 'success' || inputs.existing_contract_id != '')

    steps:
      - name: Resolve Contract ID
        id: resolve
        run: |
          if [ -n "${{ inputs.existing_contract_id }}" ]; then
            CID="${{ inputs.existing_contract_id }}"
          else
            CID="${{ needs.deploy.outputs.contract_id }}"
          fi
          [ -z "$CID" ] && echo "❌ No Contract ID!" && exit 1
          echo "contract_id=$CID" >> $GITHUB_OUTPUT

      - name: Install Stellar CLI (pre-built)
        run: |
          curl -fsSL "https://github.com/stellar/stellar-cli/releases/download/v${{ env.STELLAR_CLI_VERSION }}/stellar-cli-installer-v${{ env.STELLAR_CLI_VERSION }}-x86_64-unknown-linux-gnu.tar.gz" -o stellar-cli.tar.gz \
            || curl -fsSL "https://github.com/stellar/stellar-cli/releases/download/v${{ env.STELLAR_CLI_VERSION }}/stellar-cli-${{ env.STELLAR_CLI_VERSION }}-x86_64-unknown-linux-gnu.tar.gz" -o stellar-cli.tar.gz
          
          mkdir -p stellar-extract && tar xzf stellar-cli.tar.gz -C stellar-extract
          STELLAR_BIN=$(find stellar-extract -name 'stellar' -type f | head -1)
          
          if [ -z "$STELLAR_BIN" ]; then
            curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
            cargo binstall stellar-cli@${{ env.STELLAR_CLI_VERSION }} --no-confirm --no-symlinks 2>/dev/null \
              || { sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config libudev-dev && cargo install --locked stellar-cli; }
          else
            chmod +x "$STELLAR_BIN" && sudo cp "$STELLAR_BIN" /usr/local/bin/stellar
          fi
          stellar --version

      - name: Configure testnet
        run: |
          stellar network add testnet \
            --rpc-url https://soroban-testnet.stellar.org \
            --network-passphrase "Test SDF Network ; September 2015" \
            2>/dev/null || true

      - name: Restore admin identity
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
        run: echo "$STELLAR_SECRET_KEY" | stellar keys add admin --secret-key 2>/dev/null || true

      - name: Initialize contract
        run: |
          CID="${{ steps.resolve.outputs.contract_id }}"
          TOKEN="${{ inputs.token_contract_id || env.XLM_TOKEN }}"
          ADMIN=$(stellar keys address admin)

          echo "Initializing $CID..."
          stellar contract invoke \
            --id "$CID" \
            --source admin \
            --network testnet \
            --inclusion-fee 1000000 \
            -- initialize \
            --admin "$ADMIN" \
            --token "$TOKEN"

          echo "✅ Contract initialized!"

      - name: Final summary
        run: |
          CID="${{ steps.resolve.outputs.contract_id }}"
          echo "## 🎉 AgroPay Contract Ready!" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Variable | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Render | \`ESCROW_CONTRACT_ID\` | \`$CID\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Vercel | \`VITE_ESCROW_CONTRACT_ID\` | \`$CID\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "=========================================="
          echo "  🎉 ALL DONE!"
          echo "  Contract ID: $CID"
          echo "  Add to Render:  ESCROW_CONTRACT_ID=$CID"
          echo "  Add to Vercel:  VITE_ESCROW_CONTRACT_ID=$CID"
          echo "=========================================="
